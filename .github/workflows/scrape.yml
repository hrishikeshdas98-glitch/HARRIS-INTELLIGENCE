name: Scrape Harris County Leads

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 02:00 CDT daily
  workflow_dispatch:
    inputs:
      frcl_year:
        description: "Foreclosure Year (e.g. 2026)"
        required: false
        default: ""
      frcl_month:
        description: "Foreclosure Month number (e.g. 6 for June)"
        required: false
        default: ""
      look_back_days:
        description: "Days to look back for RP records (default 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright pypdf pdfplumber pdf2image pytesseract Pillow

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          CLERK_USERNAME:   ${{ secrets.CLERK_USERNAME }}
          CLERK_PASSWORD:   ${{ secrets.CLERK_PASSWORD }}
          FRCL_YEAR:        ${{ github.event.inputs.frcl_year }}
          FRCL_MONTH:       ${{ github.event.inputs.frcl_month }}
          LOOK_BACK_DAYS:   ${{ github.event.inputs.look_back_days || '7' }}
        run: |
          mkdir -p dashboard data
          python scraper/fetch.py

      - name: Commit & push records
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update records $(date -u '+%Y-%m-%d %H:%M UTC')"
          file_pattern: |
            dashboard/records.json
            data/records.json
            data/ghl_export_*.csv

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
